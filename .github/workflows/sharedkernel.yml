name: SharedKernel

on:
  push:
    branches: [main]
    paths:
      - 'Src/SharedKernel/**'
  pull_request:
    branches: [main]
    paths:
      - 'Src/SharedKernel/**'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Src/SharedKernel/SharedKernel.csproj

      - name: Build
        run: dotnet build Src/SharedKernel/SharedKernel.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack Src/SharedKernel/SharedKernel.csproj --configuration Release --no-build --output ./nupkgs

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text
          dotnet nuget push ./nupkgs/*.nupkg --source github --skip-duplicate
